name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; a new push cancels any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PLACE_API_URL: ${{ secrets.PLACE_API_URL }}
          PLACE_ID: ${{ secrets.PLACE_ID }}
          PLACE_MEDIA_HOST: ${{ secrets.PLACE_MEDIA_HOST }}

      - name: Assemble site
        run: |
          mkdir _site
          cp index.html _site/
          cp -r dist   _site/dist
          cp -r images _site/images

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
